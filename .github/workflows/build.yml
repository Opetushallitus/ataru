name: Ataru

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
permissions:
  id-token: write
  contents: read

env:
  HUSKY: 0

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-dependencies:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: ./.github/actions/prepare-clojure-env

      - name: Check dependencies
        run: |
          echo "Checking for confusing dependencies..."
          matches=$(lein deps :tree | grep 'confusing dependencies' || true)
          if [ -n "$matches" ]; then
            echo "Found confusing dependencies:"
            echo "$matches"
            exit 1
          else
            echo "No confusing dependencies found."
          fi

  test-integration:
    needs: [check-dependencies]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: ./.github/actions/prepare-clojure-env
      - uses: ./.github/actions/setup-node-env
      
      - name: Run integration tests (Cypress & Playwright)
        run: make ci-test-playwright-and-cypress

  test-spec: 
    needs: [check-dependencies]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: ./.github/actions/prepare-clojure-env
      - uses: ./.github/actions/setup-node-env
      - name: Prepare tests
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - name: Run Spec tests
        run: make ci-test-non-ui
  test-mocha:
    needs: [check-dependencies]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: ./.github/actions/prepare-clojure-env
      - uses: ./.github/actions/setup-node-env
      - name: Prepare tests
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - name: Run Spec and Mocha tests
        run: make ci-test-mocha

  build:
    needs: [check-dependencies]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: ./.github/actions/prepare-clojure-env
      - uses: ./.github/actions/setup-node-env

      - name: Build
        run: make ci-create-uberjars

      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        id: restore-build
        with:
          path: target
          key: ${{ github.sha }}

  build-and-deploy-ataru-hakija:
    needs: [test-integration, test-spec, test-mocha, build]
    uses: Opetushallitus/.github/.github/workflows/push-scan-java-ecr.yml@2f06269d5ac067ef17a76d2d5742db0b325e9a2e # main
    with:
      application: ataru-hakija
      base-image: baseimage-fatjar-openjdk17:master
      configfolder: oph-configuration
      jarfile: ataru
    secrets:
      AWS_UTILITY_ROLE_ARN: ${{ secrets.AWS_OPH_UTILITY_ROLE_ARN }}

  build-and-deploy-ataru-editori:
    needs: [test-integration, test-spec, test-mocha, build]
    uses: Opetushallitus/.github/.github/workflows/push-scan-java-ecr.yml@2f06269d5ac067ef17a76d2d5742db0b325e9a2e # main
    with:
      application: ataru-editori
      base-image: baseimage-fatjar-openjdk17:master
      configfolder: oph-configuration
      jarfile: ataru
    secrets:
        AWS_UTILITY_ROLE_ARN: ${{ secrets.AWS_OPH_UTILITY_ROLE_ARN }}

  build-and-deploy-ovara-ataru:
    needs: [test-integration, test-spec, test-mocha, build]
    uses: Opetushallitus/.github/.github/workflows/push-scan-java-ecr.yml@2f06269d5ac067ef17a76d2d5742db0b325e9a2e # main
    with:
      application: ovara-ataru
      base-image: baseimage-fatjar-openjdk17:master
      configfolder: ovara-configuration
      jarfile: ovara-ataru
    secrets:
      AWS_UTILITY_ROLE_ARN: ${{ secrets.AWS_OPH_UTILITY_ROLE_ARN }}
