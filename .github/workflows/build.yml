name: Ataru

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
permissions:
  id-token: write
  contents: read

env:
  HUSKY: 0

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-dependencies:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare-clojure-env

      - name: Check dependencies
        run: |
          echo "Checking for confusing dependencies..."
          matches=$(lein deps :tree | grep 'confusing dependencies' || true)
          if [ -n "$matches" ]; then
            echo "Found confusing dependencies:"
            echo "$matches"
            exit 1
          else
            echo "No confusing dependencies found."
          fi

  test-integration:
    needs: [check-dependencies]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare-clojure-env
      - uses: ./.github/actions/setup-node-env
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get installed Playwright version
        id: playwright-version
        run: |
          VERSION=$(node - <<'NODE'
          const fs = require('fs');
          const match = /['"]?@playwright\/test['"]?:\s*\n\s*specifier:\s*[^\n]+\n\s*version:\s*([^\n]+)/.exec(fs.readFileSync('pnpm-lock.yaml', 'utf8'));
          if (!match) process.exit(1);
          console.log(match[1].trim());
          NODE
          )
          echo "PLAYWRIGHT_VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Cache playwright binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
      - run: pnpm exec playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Run integration tests (Cypress & Playwright)
        run: make ci-test-playwright-and-cypress

  test-spec: 
    needs: [check-dependencies]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare-clojure-env
      - uses: ./.github/actions/setup-node-env
      - name: Prepare tests
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - name: Run Spec tests
        run: make ci-test-non-ui
  test-mocha:
    needs: [check-dependencies]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare-clojure-env
      - uses: ./.github/actions/setup-node-env
      - name: Prepare tests
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - name: Run Spec and Mocha tests
        run: make ci-test-mocha

  build:
    needs: [check-dependencies]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare-clojure-env
      - uses: ./.github/actions/setup-node-env

      - name: Build
        run: make ci-create-uberjars

      - uses: actions/cache@v5
        id: restore-build
        with:
          path: target
          key: ${{ github.sha }}

  build-and-deploy-ataru-hakija:
    needs: [test-integration, test-spec, test-mocha, build]
    uses: Opetushallitus/.github/.github/workflows/push-scan-java-ecr.yml@main
    with:
      application: ataru-hakija
      base-image: baseimage-fatjar-openjdk17:master
      configfolder: oph-configuration
      jarfile: ataru
    secrets:
      AWS_UTILITY_ROLE_ARN: ${{ secrets.AWS_OPH_UTILITY_ROLE_ARN }}

  build-and-deploy-ataru-editori:
    needs: [test-integration, test-spec, test-mocha, build]
    uses: Opetushallitus/.github/.github/workflows/push-scan-java-ecr.yml@main
    with:
      application: ataru-editori
      base-image: baseimage-fatjar-openjdk17:master
      configfolder: oph-configuration
      jarfile: ataru
    secrets:
        AWS_UTILITY_ROLE_ARN: ${{ secrets.AWS_OPH_UTILITY_ROLE_ARN }}

  build-and-deploy-ovara-ataru:
    needs: [test-integration, test-spec, test-mocha, build]
    uses: Opetushallitus/.github/.github/workflows/push-scan-java-ecr.yml@main
    with:
      application: ovara-ataru
      base-image: baseimage-fatjar-openjdk17:master
      configfolder: ovara-configuration
      jarfile: ovara-ataru
    secrets:
      AWS_UTILITY_ROLE_ARN: ${{ secrets.AWS_OPH_UTILITY_ROLE_ARN }}
